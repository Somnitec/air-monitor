; PlatformIO Project — Air Monitor (ESP32-D0WDQ6)
; Standalone sensor node: I2C/I2S sensors + DS3231 RTC + SD logger.
; LattePanda is an optional viewer over USB-serial — not a build target.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Console log line format used by serial viewer on the LattePanda.
build_flags =
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
    -D CORE_DEBUG_LEVEL=3

lib_deps =
    ; --- I2C sensors ---
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit ADXL345 @ ^1.3.4
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/RTClib @ ^2.1.4               ; DS3231

    ; --- Sensirion SEN66 (PM, VOC, NOx, CO2, T, RH) ---
    sensirion/Sensirion I2C SEN66 @ ^1.0.0
    sensirion/Sensirion Core @ ^0.7.1

    ; --- DFRobot Gravity gas sensors ---
    ; Install the Arduino libs from DFRobot's GitHub if not on the registry:
    ;   https://github.com/DFRobot/DFRobot_GAS         (CO — SEN0466 / Gravity MEMS CO)
    ;   https://github.com/DFRobot/DFRobot_HCHOSensor  (HCHO — SEN0567 or similar)
    ; If you know the exact part numbers we can pin them here.
    ; dfrobot/DFRobot_MultiGasSensor  ; not available in PlatformIO registry

    ; SD and I2S are provided by the Arduino-ESP32 core (no lib needed).
