; PlatformIO Project — Air Monitor (ESP32-D0WDQ6)
; Standalone sensor node: I2C/I2S sensors + durable queue + WiFi sync.
;
; ENVIRONMENTS (top = the one you normally build):
;   esp32_phase1        <-- MAIN firmware. baseline sampling + sync. default env.
;   esp32_phase1_ota        ...same, flashed over WiFi (OTA)
;   esp32_tester(_ota)      bring-up: connectivity test sketch
;   esp32_sensor_test(_ota) bring-up: raw sensor read sketch
;   native                  host unit tests for the pure modules (record, ringlogic)
;
; Shared board/lib config lives in the [arduino_base] section below — every
; ESP32 environment `extends` it. The host `native` test env does NOT, so it
; never inherits Arduino-only board/framework/lib settings.

[platformio]
default_envs = esp32_phase1

; ===========================================================================
; Shared settings inherited by every ESP32 environment (via `extends`).
; ===========================================================================
[arduino_base]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

build_flags =
    -D LOG_LOCAL_LEVEL=ESP_LOG_INFO
    -D CORE_DEBUG_LEVEL=3

lib_deps =
    ; --- I2C sensors ---
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit ADXL345 @ ^1.3.4
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/RTClib @ ^2.1.4

    ; --- Sensirion SEN66 (PM, VOC, NOx, CO2, T, RH) ---
    sensirion/Sensirion I2C SEN66 @ ^1.0.0
    sensirion/Sensirion Core @ ^0.7.1

    ; --- INMP441 noise analysis (FFT for octave bands / A-weighting) ---
    kosme/arduinoFFT @ ^2.0.4

    ; --- JSON records for the sync queue / HTTP POST ---
    bblanchon/ArduinoJson @ ^7.2.0

    ; SD, I2S, LittleFS, WiFi, WiFiMulti, ESPmDNS, HTTPClient ship with the core.

; ===========================================================================
; MAIN — Phase 1 firmware (firmware.cpp + mic.cpp + accel.cpp)
; Baseline sampling + durable NDJSON queue on LittleFS + WiFi HTTP sync.
; ===========================================================================
[env:esp32_phase1]
extends = arduino_base
board_build.filesystem = littlefs
build_src_filter = +<firmware.cpp> +<mic.cpp> +<accel.cpp> +<record.cpp> +<ringlogic.cpp> +<ringstore.cpp>

[env:esp32_phase1_ota]
extends = env:esp32_phase1
upload_protocol = espota
upload_port = 10.29.0.38

; ===========================================================================
; Bring-up test sketches (handy during hardware debugging)
; ===========================================================================

; ---- connectivity test (basic_connectivity_test.cpp) ----------------------
[env:esp32_tester]
extends = arduino_base
build_src_filter = +<basic_connectivity_test.cpp>

[env:esp32_tester_ota]
extends = env:esp32_tester
upload_protocol = espota
upload_port = 10.29.0.38

; ---- sensor test (basic_sensor_test.cpp) ----------------------------------
[env:esp32_sensor_test]
extends = arduino_base
build_src_filter = +<basic_sensor_test.cpp>

[env:esp32_sensor_test_ota]
extends = env:esp32_sensor_test
upload_protocol = espota
upload_port = 10.29.0.38

; ===========================================================================
; Native host unit tests for the pure modules (record, ringlogic).
; Run with:  pio test -e native
; Only Arduino-free sources compile here.
; ===========================================================================
[env:native]
platform = native
build_flags = -std=gnu++17 -DUNIT_TEST
build_src_filter = +<record.cpp> +<ringlogic.cpp>
lib_deps = bblanchon/ArduinoJson @ ^7.2.0
test_framework = unity
test_build_src = yes
