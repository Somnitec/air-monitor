<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Air Monitor</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* Tuned for the LattePanda's small touch screen: large tap targets (>=44px),
     a slide-in controls drawer so charts get the full width, and big fonts. */
  :root { --bg:#0f1115; --panel:#171a21; --line:#252a35; --fg:#e6e9ef; --mut:#8b93a7; --accent:#4ea1ff; --tap:46px; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--fg); font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         -webkit-user-select:none; user-select:none; overscroll-behavior:none; }

  header { position:sticky; top:0; z-index:30; padding:8px 12px; border-bottom:1px solid var(--line);
           display:flex; gap:12px; align-items:center; background:var(--bg); }
  h1 { font-size:16px; margin:0; font-weight:600; white-space:nowrap; }
  .grow { flex:1; }
  .pill { font-size:12px; color:var(--mut); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#c0392b; margin-right:6px; vertical-align:middle; }
  .dot.live { background:#2ecc71; }
  .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:8px; white-space:nowrap; }
  .badge.normal  { background:#1f3a5f; color:#bcd7ff; }
  .badge.testing { background:#1f7a44; color:#eafff1; }
  .badge.offline { background:#3a1f23; color:#ffb3bd; }
  .badge.pending { outline:1px dashed #ffce6b; }

  /* icon buttons in the header */
  .iconbtn { min-width:var(--tap); height:var(--tap); border:1px solid var(--line); border-radius:10px;
             background:#222633; color:var(--fg); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .iconbtn:active { background:#2c3243; }

  /* layout */
  .wrap { display:flex; gap:14px; padding:14px; align-items:flex-start; }
  #charts { flex:1; min-width:0; }
  .chart { background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:12px; }

  /* controls become a slide-in drawer */
  .controls { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; width:300px; flex:0 0 auto; }
  .controls h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--mut); margin:0 0 8px; }
  .controls section { margin-bottom:20px; }
  label { display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  select, input, button { background:#0e1117; color:var(--fg); border:1px solid var(--line); border-radius:10px;
                          padding:0 12px; font-size:15px; width:100%; min-height:var(--tap); }
  button { cursor:pointer; background:var(--accent); color:#06203f; border:none; font-weight:700; }
  button.sec { background:#222633; color:var(--fg); }
  button:active { filter:brightness(1.15); }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .metrics { max-height:42vh; overflow:auto; border:1px solid var(--line); border-radius:10px; padding:4px; -webkit-overflow-scrolling:touch; }
  .metrics label { display:flex; align-items:center; gap:12px; margin:0; padding:11px 8px; color:var(--fg); cursor:pointer; border-radius:8px; font-size:15px; }
  .metrics label:active { background:#222633; }
  .metrics input { width:24px; height:24px; min-height:0; flex:0 0 auto; }
  .events-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .events-grid button { font-size:14px; min-height:var(--tap); padding:0 6px; }
  /* toggle buttons: dim when off, green when on */
  button.toggle { background:#222633; color:var(--mut); border:1px solid var(--line); font-weight:600; }
  button.toggle.on { background:#1f7a44; color:#eafff1; border-color:#2ecc71; }
  /* ventilation slider: large touch target */
  input.slider { -webkit-appearance:none; appearance:none; width:100%; height:14px; padding:0;
                 border:none; border-radius:8px; background:#222633; margin:6px 0; }
  input.slider::-webkit-slider-thumb { -webkit-appearance:none; width:30px; height:30px; border-radius:50%;
                 background:var(--accent); border:3px solid #0e1117; cursor:pointer; }
  input.slider::-moz-range-thumb { width:30px; height:30px; border-radius:50%;
                 background:var(--accent); border:3px solid #0e1117; cursor:pointer; }
  .stat { font-size:13px; color:var(--mut); margin-top:8px; min-height:18px; }

  /* backdrop shown when drawer is open on small screens */
  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:18; display:none; }

  /* big low-battery warning across the top */
  #batwarn { position:fixed; top:0; left:0; right:0; z-index:50; display:none;
             background:#b3261e; color:#fff; font-size:18px; font-weight:800; letter-spacing:.02em;
             text-align:center; padding:14px 16px; box-shadow:0 2px 14px rgba(0,0,0,.55); }
  #batwarn.show { display:block; animation:batpulse 1.3s ease-in-out infinite; }
  @keyframes batpulse { 0%,100%{ background:#b3261e; } 50%{ background:#e0392b; } }

  /* --- small screen (the LattePanda touch panel) --- */
  @media (max-width: 820px) {
    .wrap { padding:10px; }
    .controls {
      position:fixed; top:0; left:0; bottom:0; width:min(86vw, 340px); z-index:20;
      border-radius:0 14px 14px 0; overflow-y:auto; -webkit-overflow-scrolling:touch;
      transform:translateX(-105%); transition:transform .22s ease;
    }
    body.drawer-open .controls { transform:translateX(0); }
    body.drawer-open .backdrop { display:block; }
    .hide-sm { display:none; }
  }
  /* on wide screens the menu button is unnecessary */
  @media (min-width: 821px) { #menu { display:none; } .backdrop { display:none !important; } }

  /* --- aircraft panel (live map + table) --- */
  .acpanel { background:var(--panel); border:1px solid var(--line); border-radius:12px; margin:14px 14px 0; overflow:hidden; }
  .acpanel.collapsed .acbody { display:none; }
  .achead { display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; }
  .achead h2 { font-size:14px; margin:0; font-weight:600; }
  .achead .account { color:var(--accent); font-size:13px; font-weight:600; }
  .achead .acrange { color:var(--mut); font-size:12px; }
  .achead .acchev { margin-left:auto; color:var(--mut); transition:transform .2s; }
  .acpanel.collapsed .acchev { transform:rotate(-90deg); }
  .acbody { display:flex; flex-wrap:wrap; }
  #acmap { height:360px; flex:2 1 360px; min-width:260px; background:#0e1117; }
  .actablewrap { flex:1 1 300px; max-height:360px; overflow:auto; border-left:1px solid var(--line); -webkit-overflow-scrolling:touch; }
  .actable { width:100%; border-collapse:collapse; font-size:13px; }
  .actable th, .actable td { padding:7px 9px; text-align:left; white-space:nowrap; border-bottom:1px solid var(--line); }
  .actable th { position:sticky; top:0; background:#1b1f28; color:var(--mut); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .actable tbody tr:hover { background:#1b1f28; }
  .actable .up { color:#2ecc71; } .actable .down { color:#ff8c69; } .actable .lvl { color:var(--mut); }
  /* leaflet dark tweaks + plane marker */
  .leaflet-container { background:#0e1117; font:inherit; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip { background:#171a21; color:var(--fg); }
  .leaflet-bar a { background:#222633; color:var(--fg); border-color:var(--line); }
  .planeicon { font-size:17px; line-height:17px; filter:drop-shadow(0 0 2px #000); }
  @media (max-width: 820px) { .acpanel { margin:10px 10px 0; } #acmap { flex-basis:100%; height:300px; }
    .actablewrap { border-left:none; border-top:1px solid var(--line); } }
</style>
</head>
<body>
<header>
  <button id="menu" class="iconbtn" aria-label="Menu">☰</button>
  <h1>🌫️ Air Monitor</h1>
  <span class="pill"><span id="livedot" class="dot"></span><span id="livetxt" class="hide-sm">connecting…</span></span>
  <span class="pill" id="devmode" title="Sensor device mode"></span>
  <span class="grow"></span>
  <span class="pill hide-sm" id="stats"></span>
  <button id="fs" class="iconbtn" aria-label="Fullscreen">⛶</button>
</header>

<div class="backdrop" id="backdrop"></div>
<div id="batwarn">🔋 Battery low</div>

<div id="aircraftPanel" class="acpanel">
  <div class="achead" id="acHead">
    <h2>✈ Aircraft</h2>
    <span class="account" id="acCount">—</span>
    <span class="acrange" id="acRangeLbl"></span>
    <span class="acchev">▾</span>
  </div>
  <div class="acbody">
    <div id="acmap"></div>
    <div class="actablewrap">
      <table class="actable">
        <thead><tr><th>Flight</th><th>Type</th><th>Alt</th><th>Spd</th><th>Dist</th><th>Brg</th><th></th></tr></thead>
        <tbody id="acRows"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="controls" id="drawer">
    <section>
      <h2>Time range</h2>
      <label>Window</label>
      <select id="range">
        <option value="3600">Last hour</option>
        <option value="21600">Last 6 hours</option>
        <option value="86400" selected>Last 24 hours</option>
        <option value="604800">Last 7 days</option>
        <option value="2592000">Last 30 days</option>
        <option value="custom">Custom…</option>
      </select>
      <div id="customRange" style="display:none">
        <label>From</label><input type="datetime-local" id="from" />
        <label>To</label><input type="datetime-local" id="to" />
      </div>
      <div class="row" style="margin-top:10px">
        <button id="refresh">Query</button>
        <button class="sec" id="livebtn">Live: on</button>
      </div>
    </section>

    <section>
      <h2>✈ Aircraft range</h2>
      <label>Show planes within <span id="acRangeVal">40</span> km</label>
      <input type="range" id="acRange" min="5" max="250" step="5" value="40" class="slider" />
    </section>

    <section>
      <h2>Metrics</h2>
      <div class="metrics" id="metrics"></div>
    </section>

    <section>
      <h2>Home state</h2>
      <div class="events-grid" id="toggles"></div>
      <label style="margin-top:14px">💨 Ventilation — <span id="ventVal">0%</span></label>
      <input type="range" id="vent" min="0" max="100" step="5" value="0" class="slider" />
      <div class="stat" id="evstat"></div>
    </section>

    <section>
      <h2>Sensor device</h2>
      <div class="stat" id="devstat">no device seen yet</div>
      <div class="row" style="margin-top:10px">
        <button id="testBtn" class="sec">Enter testing mode</button>
      </div>
      <div class="stat" id="devpending"></div>
    </section>

    <section>
      <h2>Add marker</h2>
      <label>Note (e.g. "fell on the ground", "moved 2 m")</label>
      <input type="text" id="markerText" placeholder="type a note…" maxlength="200" />
      <div class="row" style="margin-top:10px">
        <button id="markerAdd">Add marker</button>
      </div>
    </section>
  </div>

  <div id="charts"></div>
</div>

<script>
// ---- friendly labels + grouping so related metrics share a chart ----------
// a:2 puts the metric on the chart's right-hand (secondary) y-axis — used when
// two related series share a chart but have very different units/scales.
const META = {
  pm1:{g:'Particulates (µg/m³)',n:'PM1'}, pm25:{g:'Particulates (µg/m³)',n:'PM2.5'},
  pm4:{g:'Particulates (µg/m³)',n:'PM4'}, pm10:{g:'Particulates (µg/m³)',n:'PM10'},
  // All gases on one chart: levels/indices/mV on the left, Rs (Ω) on the right.
  co2:{g:'Gases',n:'CO₂ ppm'},
  voc:{g:'Gases',n:'VOC index'}, nox:{g:'Gases',n:'NOx index'},
  co_mv:{g:'Gases',n:'CO mV'}, hcho_mv:{g:'Gases',n:'HCHO mV'},
  co_rs:{g:'Gases',n:'CO Rs',a:2}, hcho_rs:{g:'Gases',n:'HCHO Rs',a:2},
  temp:{g:'Temp / Humidity',n:'Temp °C'}, rh:{g:'Temp / Humidity',n:'RH %'},
  bme_temp:{g:'Temp / Humidity',n:'BME temp °C'}, bme_rh:{g:'Temp / Humidity',n:'BME RH %'},
  pressure_hpa:{g:'Pressure (hPa)',n:'Pressure'},
  lux:{g:'Light (lux)',n:'Light'},
  noise_dba:{g:'Noise (dB)',n:'dB(A)'}, noise_spl:{g:'Noise (dB)',n:'SPL'},
  noise_dbfs:{g:'Noise (dBFS)',n:'dBFS'},
  // Motion: rumble (left) + accel magnitude (right) on one chart
  rumble:{g:'Motion (m/s²)',n:'Rumble RMS'}, rumble_peak:{g:'Motion (m/s²)',n:'Rumble peak'},
  accel_mag:{g:'Motion (m/s²)',n:'|a| magnitude',a:2},
  // Soil: moisture % (left) + raw mV (right) on one chart
  soil_pct:{g:'Soil',n:'Soil %'}, soil_mv:{g:'Soil',n:'Soil mV',a:2},
  bat_raw_mv:{g:'Battery',n:'Bat raw mV'}, bat_v:{g:'Battery',n:'Bat V'}, bat_pct:{g:'Battery',n:'Bat %'},
};
// Per-chart axis titles for the dual-axis groups (left = y, right = y2).
const GROUP_AXES = {
  'Gases':         { y:'ppm / index / mV', y2:'Rs (Ω)' },
  'Motion (m/s²)': { y:'rumble m/s²', y2:'|a| m/s²' },
  'Soil':          { y:'%', y2:'mV' },
};
// Chart stacking order (top→bottom). Battery is always forced last regardless.
const GROUP_ORDER = [
  'Particulates (µg/m³)','Gases','Temp / Humidity','Pressure (hPa)',
  'Light (lux)','Noise (dB)','Noise (dBFS)','Soil','Motion (m/s²)',
];
function groupRank(g) {
  if (g === 'Battery') return 1e6;        // always at the bottom
  const i = GROUP_ORDER.indexOf(g);
  return i < 0 ? 5e5 : i;                  // unknown groups sit above Battery
}

let live = true, selected = new Set(), allMetrics = [];
let dataCache = [];   // current query result (array of flat records)
let eventsCache = [];

const $ = s => document.querySelector(s);

function fmtRange() {
  const sel = $('#range').value;
  if (sel === 'custom') {
    const f = $('#from').value ? Math.floor(new Date($('#from').value).getTime()/1000) : null;
    const t = $('#to').value ? Math.floor(new Date($('#to').value).getTime()/1000) : null;
    return { since: f, until: t };
  }
  return { since: Math.floor(Date.now()/1000) - parseInt(sel), until: null };
}

async function loadMetrics() {
  allMetrics = await (await fetch('/api/metrics')).json();
  if (selected.size === 0)
    allMetrics.forEach(m => selected.add(m));   // everything on when you first arrive
  const box = $('#metrics'); box.innerHTML = '';
  allMetrics.forEach(m => {
    const lbl = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = selected.has(m);
    cb.onchange = () => { cb.checked ? selected.add(m) : selected.delete(m); render(); };
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode((META[m]?.n || m)));
    box.appendChild(lbl);
  });
}

async function query() {
  const { since, until } = fmtRange();
  const qs = new URLSearchParams();
  if (since) qs.set('since', since);
  if (until) qs.set('until', until);
  dataCache = await (await fetch('/api/readings?' + qs)).json();
  eventsCache = await (await fetch('/api/events?' + qs)).json();
  render();
  restoreToggleStates();
  checkBattery();
  loadStats();
}

async function loadStats() {
  const s = await (await fetch('/api/stats')).json();
  const span = (s.first_ts && s.last_ts)
    ? `${new Date(s.first_ts*1000).toLocaleString()} → ${new Date(s.last_ts*1000).toLocaleString()}`
    : 'no data yet';
  $('#stats').textContent = `${s.readings} readings · ${s.events} events · ${span}`;
}

// group selected metrics by their chart group, one Plotly chart per group
function render() {
  const groups = {};
  [...selected].forEach(m => {
    const g = META[m]?.g || m;
    (groups[g] ||= []).push(m);
  });

  const host = $('#charts');
  // remove charts no longer needed
  [...host.children].forEach(c => { if (!groups[c.dataset.group]) c.remove(); });

  Object.entries(groups).forEach(([g, metrics]) => {
    let div = [...host.children].find(c => c.dataset.group === g);
    if (!div) {
      div = document.createElement('div');
      div.className = 'chart'; div.dataset.group = g; div.style.height = '260px';
      host.appendChild(div);
    }
    const hasRight = metrics.some(m => META[m]?.a === 2);
    const traces = metrics.map(m => ({
      x: dataCache.map(r => new Date(r.ts*1000)),
      y: dataCache.map(r => r[m] ?? null),
      name: META[m]?.n || m, mode:'lines', line:{width:1.6}, connectgaps:false,
      yaxis: META[m]?.a === 2 ? 'y2' : 'y',
    }));
    // event markers as vertical lines (shapes)
    const shapes = eventsCache.map(e => ({
      type:'line', x0:new Date(e.ts*1000), x1:new Date(e.ts*1000), yref:'paper', y0:0, y1:1,
      line:{color:'rgba(255,200,80,.45)', width:1, dash:'dot'},
    }));
    const annotations = eventsCache.map(e => ({
      x:new Date(e.ts*1000), y:1, yref:'paper', text:(e.label||e.kind), showarrow:false,
      font:{size:9, color:'#ffce6b'}, textangle:-90, xanchor:'left', yanchor:'top',
    }));
    const ax = GROUP_AXES[g] || {};
    const layout = {
      title:{text:g, font:{size:13, color:'#cfd5e3'}, x:0.01},
      paper_bgcolor:'#171a21', plot_bgcolor:'#171a21',
      font:{color:'#9aa3b5', size:11},
      margin:{l:48, r:hasRight ? 52 : 14, t:30, b:30}, height:260,
      xaxis:{gridcolor:'#252a35'},
      yaxis:{gridcolor:'#252a35', title:{text:ax.y || '', font:{size:10}}},
      showlegend:true, legend:{orientation:'h', y:-0.18, font:{size:10}},
      shapes, annotations,
    };
    if (hasRight) {
      layout.yaxis2 = { overlaying:'y', side:'right', gridcolor:'transparent',
                        title:{text:ax.y2 || '', font:{size:10}} };
    }
    Plotly.react(div, traces, layout, {displayModeBar:false, responsive:true});
  });

  // keep charts in a stable order, Battery always pinned to the bottom
  [...host.children]
    .sort((a, b) => groupRank(a.dataset.group) - groupRank(b.dataset.group))
    .forEach(c => host.appendChild(c));
}

// ---- live updates over WebSocket ------------------------------------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { $('#livedot').classList.add('live'); $('#livetxt').textContent = 'live'; };
  ws.onclose = () => { $('#livedot').classList.remove('live'); $('#livetxt').textContent = 'reconnecting…'; setTimeout(connectWS, 2000); };
  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'aircraft') { updateAircraft(msg.data); return; }   // live view, independent of the Live toggle
    if (!live) return;
    if (msg.type === 'reading') { dataCache.push(msg.data); trimToWindow(); render(); checkBattery(); loadStats(); }
    if (msg.type === 'device')  { deviceState = msg.data; renderDevice(); }
    if (msg.type === 'event')   {
      eventsCache.push(msg.data); render();
      // reflect a toggle flipped from another client/device
      const t = TOGGLES.find(t => t.kind === msg.data.kind);
      if (t) { toggleState[t.kind] = (msg.data.label === t.on); renderToggles(); }
      if (msg.data.kind === 'ventilation') restoreVent();
    }
  };
}
function trimToWindow() {
  const { since } = fmtRange();
  if (since) dataCache = dataCache.filter(r => r.ts >= since);
}

// ---- home-state toggles ---------------------------------------------------
// Each toggle flips between two states and logs an event with the new label.
const TOGGLES = [
  { kind:'door',        on:'open',  off:'close', onTxt:'🚪 Door open',  offTxt:'🚪 Door closed' },
  { kind:'occupancy',   on:'home',  off:'away',  onTxt:'🏠 Home',       offTxt:'🚶 Away' },
  { kind:'heating',     on:'on',    off:'off',   onTxt:'🔥 Heating on', offTxt:'🔥 Heating off' },
  { kind:'pc',          on:'on',    off:'off',   onTxt:'💻 PC on',      offTxt:'💻 PC off' },
  { kind:'soundsys',    on:'on',    off:'off',   onTxt:'🔊 Sound on',   offTxt:'🔊 Sound off' },
  { kind:'sleep',       on:'sleep', off:'wake',  onTxt:'😴 Sleeping',   offTxt:'☀️ Awake' },
];
const toggleState = {};   // kind -> bool (on)

function renderToggles() {
  const grid = $('#toggles'); grid.innerHTML = '';
  TOGGLES.forEach(t => {
    const on = !!toggleState[t.kind];
    const b = document.createElement('button');
    b.className = 'toggle' + (on ? ' on' : '');
    b.textContent = on ? t.onTxt : t.offTxt;
    b.onclick = async () => {
      const nowOn = !toggleState[t.kind];
      toggleState[t.kind] = nowOn;
      renderToggles();
      const ev = await (await fetch('/api/event', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind:t.kind, label: nowOn ? t.on : t.off }),
      })).json();
      $('#evstat').textContent = `logged: ${ev.kind}/${ev.label} @ ${new Date(ev.ts*1000).toLocaleTimeString()}`;
    };
    grid.appendChild(b);
  });
}

// Restore each toggle to whatever its most recent event in the window was.
function restoreToggleStates() {
  TOGGLES.forEach(t => {
    const last = eventsCache.filter(e => e.kind === t.kind).sort((a,b) => b.ts - a.ts)[0];
    toggleState[t.kind] = last ? (last.label === t.on) : false;
  });
  renderToggles();
  restoreVent();
}

// ---- ventilation slider (0–100%) ------------------------------------------
function restoreVent() {
  const last = eventsCache.filter(e => e.kind === 'ventilation').sort((a,b) => b.ts - a.ts)[0];
  const pct = last ? parseInt(last.label) || 0 : 0;
  $('#vent').value = pct;
  $('#ventVal').textContent = pct + '%';
}
$('#vent').addEventListener('input',  () => { $('#ventVal').textContent = $('#vent').value + '%'; });
$('#vent').addEventListener('change', async () => {        // fires on release → one event
  const pct = $('#vent').value;
  const ev = await (await fetch('/api/event', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ kind:'ventilation', label: pct + '%' }),
  })).json();
  $('#evstat').textContent = `vent: ${ev.label} @ ${new Date(ev.ts*1000).toLocaleTimeString()}`;
});

// ---- custom text marker ---------------------------------------------------
async function addMarker() {
  const inp = $('#markerText');
  const text = inp.value.trim();
  if (!text) return;
  const ev = await (await fetch('/api/event', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ kind:'note', label:text }),
  })).json();
  inp.value = '';
  $('#evstat').textContent = `marker: "${ev.label}" @ ${new Date(ev.ts*1000).toLocaleTimeString()}`;
}

// ---- low-battery warning --------------------------------------------------
const BAT_LOW_PCT = 15, BAT_LOW_V = 3.3;
function checkBattery() {
  let pct = null, v = null;
  for (let i = dataCache.length - 1; i >= 0; i--) {     // newest reading with battery data
    const r = dataCache[i];
    if (r.bat_pct != null) { pct = r.bat_pct; v = r.bat_v ?? null; break; }
    if (r.bat_v   != null) { v = r.bat_v; break; }
  }
  const low = (pct != null && pct < BAT_LOW_PCT) ||
              (pct == null && v != null && v < BAT_LOW_V);
  const el = $('#batwarn');
  el.classList.toggle('show', low);
  if (low) el.textContent = `🔋 Battery low — ${pct != null ? pct.toFixed(0) + '%' : v.toFixed(2) + ' V'} · charge soon`;
}

// ---- wire up controls -----------------------------------------------------
$('#range').onchange = () => {
  $('#customRange').style.display = $('#range').value === 'custom' ? 'block' : 'none';
};
$('#refresh').onclick = () => { query(); closeDrawer(); };
$('#markerAdd').onclick = addMarker;
$('#markerText').addEventListener('keydown', e => { if (e.key === 'Enter') addMarker(); });
$('#livebtn').onclick = () => {
  live = !live;
  $('#livebtn').textContent = live ? 'Live: on' : 'Live: off';
};

// ---- touch drawer + fullscreen + screen wake-lock -------------------------
function openDrawer()  { document.body.classList.add('drawer-open'); }
function closeDrawer() { document.body.classList.remove('drawer-open'); }
$('#menu').onclick = () =>
  document.body.classList.contains('drawer-open') ? closeDrawer() : openDrawer();
$('#backdrop').onclick = closeDrawer;

$('#fs').onclick = () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.();
};

// Keep the panel awake while the dashboard is on screen, and re-acquire the
// lock when the display returns from sleep after a touch (wake-on-touch is an
// OS setting — see pc/README.md — this just stops the *browser* from dimming).
let wakeLock = null;
async function keepAwake() {
  try { wakeLock = await navigator.wakeLock?.request('screen'); } catch (_) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepAwake();
});

// ---- sensor-device mode badge + testing toggle ----------------------------
let deviceState = null;   // {dev,mode,last_seen,buffered,pending}
const OFFLINE_AFTER = 35 * 60;   // > 2x the 15-min sync interval

function renderDevice() {
  const el = $('#devmode'), st = $('#devstat'), pend = $('#devpending'), btn = $('#testBtn');
  if (!deviceState) { el.textContent = ''; return; }
  const age = Math.floor(Date.now()/1000) - (deviceState.last_seen || 0);
  const offline = age > OFFLINE_AFTER;
  const mode = offline ? 'offline' : (deviceState.mode || 'normal');
  el.className = 'pill';
  el.innerHTML = `<span class="badge ${mode}${deviceState.pending ? ' pending' : ''}">${mode.toUpperCase()}</span>`;
  st.textContent = `${deviceState.dev} · ${deviceState.buffered ?? '?'} buffered · seen ${age}s ago`;
  const wantTesting = (deviceState.mode !== 'testing');
  btn.textContent = wantTesting ? 'Enter testing mode' : 'Stop testing mode';
  pend.textContent = deviceState.pending
    ? `pending: switch to ${deviceState.pending} (applies at next sync)` : '';
}

async function loadDevices() {
  const devs = await (await fetch('/api/devices')).json();
  if (devs.length) { deviceState = devs[0]; renderDevice(); }
}

$('#testBtn').onclick = async () => {
  if (!deviceState) return;
  const target = (deviceState.mode === 'testing') ? 'normal' : 'testing';
  await fetch(`/api/device/${encodeURIComponent(deviceState.dev)}/mode`,
    { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode: target }) });
  deviceState.pending = target; renderDevice();
};

// ---- aircraft (ADS-B live map + table) ------------------------------------
let acMap, acRing, acIcons = {}, acData = [], acHome = null;
let acRange = parseInt(localStorage.getItem('acRange')) || 40;

async function initAircraft() {
  let cfg = {};
  try { cfg = await (await fetch('/api/config')).json(); } catch (_) {}
  acHome = (cfg && cfg.home) || [52.179722, 5.284722];

  acMap = L.map('acmap', { zoomControl:true }).setView(acHome, 9);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom:18, attribution:'&copy; OpenStreetMap, &copy; CARTO',
  }).addTo(acMap);
  L.circleMarker(acHome, { radius:5, color:'#4ea1ff', fillColor:'#4ea1ff', fillOpacity:1 })
    .addTo(acMap).bindPopup('Home');
  acRing = L.circle(acHome, { radius: acRange*1000, color:'#4ea1ff', weight:1, fill:false, dashArray:'4 4' }).addTo(acMap);

  const sl = $('#acRange'); sl.value = acRange; $('#acRangeVal').textContent = acRange;
  sl.addEventListener('input',  () => { $('#acRangeVal').textContent = sl.value; });
  sl.addEventListener('change', () => setAcRange(parseInt(sl.value)));
  $('#acHead').onclick = () => $('#aircraftPanel').classList.toggle('collapsed');

  try { updateAircraft(await (await fetch('/api/aircraft')).json()); } catch (_) {}
  setTimeout(() => acMap && acMap.invalidateSize(), 250);   // map needs a layout pass
}

function setAcRange(km) {
  acRange = km; localStorage.setItem('acRange', km);
  $('#acRangeVal').textContent = km; if (acRing) acRing.setRadius(km*1000);
  renderAircraft();
}

function updateAircraft(list) { acData = Array.isArray(list) ? list : []; renderAircraft(); }

function planeIcon(track) {
  return L.divIcon({ className:'', iconSize:[20,20], iconAnchor:[10,10],
    html:`<div class="planeicon" style="transform:rotate(${track || 0}deg)">✈️</div>` });
}

function renderAircraft() {
  if (!acMap) return;
  const inRange = acData.filter(a => a.distance_km != null && a.distance_km <= acRange);
  $('#acCount').textContent = `${inRange.length} in range`;
  $('#acRangeLbl').textContent = `· ≤ ${acRange} km`;

  const seen = new Set();
  inRange.forEach(a => {
    if (a.lat == null || a.lon == null) return;
    seen.add(a.hex);
    const ll = [a.lat, a.lon];
    if (acIcons[a.hex]) acIcons[a.hex].setLatLng(ll).setIcon(planeIcon(a.track));
    else acIcons[a.hex] = L.marker(ll, { icon: planeIcon(a.track) }).addTo(acMap);
    acIcons[a.hex].bindPopup(
      `<b>${a.flight || a.hex}</b>${a.type ? ' · ' + a.type : ''}<br>`
      + `${a.alt_baro != null ? a.alt_baro + ' ft' : '—'} · ${a.gs != null ? Math.round(a.gs) + ' kt' : '—'}<br>`
      + `${a.distance_km} km · ${Math.round(a.bearing_deg)}°`);
  });
  Object.keys(acIcons).forEach(h => { if (!seen.has(h)) { acMap.removeLayer(acIcons[h]); delete acIcons[h]; } });

  $('#acRows').innerHTML = inRange.map(a => {
    const vr = a.baro_rate || 0;
    const ar = vr > 64 ? '<span class="up">▲</span>' : vr < -64 ? '<span class="down">▼</span>' : '<span class="lvl">–</span>';
    return `<tr><td>${a.flight || a.hex}</td><td>${a.type || ''}</td>`
      + `<td>${a.alt_baro != null ? a.alt_baro : '—'}</td>`
      + `<td>${a.gs != null ? Math.round(a.gs) : '—'}</td>`
      + `<td>${a.distance_km != null ? a.distance_km.toFixed(1) : '—'}</td>`
      + `<td>${a.bearing_deg != null ? Math.round(a.bearing_deg) : '—'}</td><td>${ar}</td></tr>`;
  }).join('') || `<tr><td colspan="7" style="color:var(--mut);padding:14px">No aircraft in range (is readsb running?)</td></tr>`;
}

(async function init(){
  renderToggles();
  await loadMetrics();
  await query();
  await loadDevices();
  setInterval(loadDevices, 30000);   // re-poll device state (also drives offline detection)
  await initAircraft();
  connectWS();
  keepAwake();
  // refresh the metric list occasionally in case new fields appear
  setInterval(loadMetrics, 60000);
})();
</script>
