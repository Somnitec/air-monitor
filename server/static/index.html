<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Air Monitor</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* Tuned for the LattePanda's small touch screen: large tap targets (>=44px),
     a slide-in controls drawer so charts get the full width, and big fonts. */
  :root { --bg:#0f1115; --panel:#171a21; --line:#252a35; --fg:#e6e9ef; --mut:#8b93a7; --accent:#4ea1ff; --tap:46px; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--fg); font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         -webkit-user-select:none; user-select:none; overscroll-behavior:none; }

  header { position:sticky; top:0; z-index:30; padding:8px 12px; border-bottom:1px solid var(--line);
           display:flex; gap:12px; align-items:center; background:var(--bg); }
  h1 { font-size:16px; margin:0; font-weight:600; white-space:nowrap; }
  .grow { flex:1; }
  .pill { font-size:12px; color:var(--mut); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; background:#c0392b; margin-right:6px; vertical-align:middle; }
  .dot.live { background:#2ecc71; }
  .badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:8px; white-space:nowrap; }
  .badge.normal  { background:#1f3a5f; color:#bcd7ff; }
  .badge.testing { background:#1f7a44; color:#eafff1; }
  .badge.offline { background:#3a1f23; color:#ffb3bd; }
  .badge.pending { outline:1px dashed #ffce6b; }

  /* icon buttons in the header */
  .iconbtn { min-width:var(--tap); height:var(--tap); border:1px solid var(--line); border-radius:10px;
             background:#222633; color:var(--fg); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .iconbtn:active { background:#2c3243; }

  /* layout */
  .wrap { display:flex; gap:14px; padding:14px; align-items:flex-start; }
  #charts { flex:1; min-width:0; }
  .chart { background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:12px; }

  /* controls become a slide-in drawer */
  .controls { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; width:300px; flex:0 0 auto; }
  .controls h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--mut); margin:0 0 8px; }
  .controls section { margin-bottom:20px; }
  label { display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  select, input, button { background:#0e1117; color:var(--fg); border:1px solid var(--line); border-radius:10px;
                          padding:0 12px; font-size:15px; width:100%; min-height:var(--tap); }
  button { cursor:pointer; background:var(--accent); color:#06203f; border:none; font-weight:700; }
  button.sec { background:#222633; color:var(--fg); }
  button:active { filter:brightness(1.15); }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .metrics { max-height:42vh; overflow:auto; border:1px solid var(--line); border-radius:10px; padding:4px; -webkit-overflow-scrolling:touch; }
  .metrics label { display:flex; align-items:center; gap:12px; margin:0; padding:11px 8px; color:var(--fg); cursor:pointer; border-radius:8px; font-size:15px; }
  .metrics label:active { background:#222633; }
  .metrics input { width:24px; height:24px; min-height:0; flex:0 0 auto; }
  .events-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .events-grid button { font-size:14px; min-height:var(--tap); padding:0 6px; }
  /* toggle buttons: dim when off, green when on */
  button.toggle { background:#222633; color:var(--mut); border:1px solid var(--line); font-weight:600; }
  button.toggle.on { background:#1f7a44; color:#eafff1; border-color:#2ecc71; }
  /* ventilation slider: large touch target */
  input.slider { -webkit-appearance:none; appearance:none; width:100%; height:14px; padding:0;
                 border:none; border-radius:8px; background:#222633; margin:6px 0; }
  input.slider::-webkit-slider-thumb { -webkit-appearance:none; width:30px; height:30px; border-radius:50%;
                 background:var(--accent); border:3px solid #0e1117; cursor:pointer; }
  input.slider::-moz-range-thumb { width:30px; height:30px; border-radius:50%;
                 background:var(--accent); border:3px solid #0e1117; cursor:pointer; }
  .stat { font-size:13px; color:var(--mut); margin-top:8px; min-height:18px; }

  /* backdrop shown when drawer is open on small screens */
  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:18; display:none; }

  /* big low-battery warning across the top */
  #batwarn { position:fixed; top:0; left:0; right:0; z-index:50; display:none;
             background:#b3261e; color:#fff; font-size:18px; font-weight:800; letter-spacing:.02em;
             text-align:center; padding:14px 16px; box-shadow:0 2px 14px rgba(0,0,0,.55); }
  #batwarn.show { display:block; animation:batpulse 1.3s ease-in-out infinite; }
  @keyframes batpulse { 0%,100%{ background:#b3261e; } 50%{ background:#e0392b; } }

  /* --- small screen (the LattePanda touch panel) --- */
  @media (max-width: 820px) {
    .wrap { padding:10px; }
    .controls {
      position:fixed; top:0; left:0; bottom:0; width:min(86vw, 340px); z-index:20;
      border-radius:0 14px 14px 0; overflow-y:auto; -webkit-overflow-scrolling:touch;
      transform:translateX(-105%); transition:transform .22s ease;
    }
    body.drawer-open .controls { transform:translateX(0); }
    body.drawer-open .backdrop { display:block; }
    .hide-sm { display:none; }
  }
  /* on wide screens the menu button is unnecessary */
  @media (min-width: 821px) { #menu { display:none; } .backdrop { display:none !important; } }

  /* --- aircraft panel (live map + table) --- */
  .acpanel { background:var(--panel); border:1px solid var(--line); border-radius:12px; margin:14px 14px 0; overflow:hidden; }
  .acpanel.collapsed .acbody { display:none; }
  .achead { display:flex; align-items:center; gap:10px; padding:11px 14px; cursor:pointer; }
  .achead h2 { font-size:14px; margin:0; font-weight:600; }
  .achead .account { color:var(--accent); font-size:13px; font-weight:600; }
  .achead .acrange { color:var(--mut); font-size:12px; }
  .achead .acchev { margin-left:auto; color:var(--mut); transition:transform .2s; }
  .acpanel.collapsed .acchev { transform:rotate(-90deg); }
  .acbody { display:flex; flex-wrap:wrap; }
  #pathSide { height:360px; flex:0 0 360px; width:360px; background:#0e1117; border-right:1px solid var(--line); cursor:default; }
  #acmap { height:360px; flex:2 1 360px; min-width:260px; background:#0e1117; }
  .actablewrap { flex:1 1 300px; max-height:360px; overflow:auto; border-left:1px solid var(--line); -webkit-overflow-scrolling:touch; }
  .actable { width:100%; border-collapse:collapse; font-size:13px; }
  .actable th, .actable td { padding:7px 9px; text-align:left; white-space:nowrap; border-bottom:1px solid var(--line); }
  .actable td { -webkit-user-select:text; user-select:text; }
  .actable th { position:sticky; top:0; background:#1b1f28; color:var(--mut); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .actable tbody tr:hover { background:#1b1f28; }
  .actable .up { color:#2ecc71; } .actable .down { color:#ff8c69; } .actable .lvl { color:var(--mut); }
  /* leaflet dark tweaks + plane marker */
  .leaflet-container { background:#0e1117; font:inherit; }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip { background:#171a21; color:var(--fg); }
  .leaflet-bar a { background:#222633; color:var(--fg); border-color:var(--line); }
  .planeicon { filter:drop-shadow(0 0 2px #000); }    /* font-size set per-icon by weight */
  /* public-only aircraft (reference feed, not heard by our SDR): dimmed + desaturated */
  .planeicon.public { opacity:.45; filter:grayscale(1) drop-shadow(0 0 2px #000); }
  .actable tr.public td { color:var(--mut); }
  .kindbadge { font-size:10px; font-weight:600; padding:1px 5px; border-radius:4px;
               background:rgba(255,255,255,.07); color:var(--mut); margin-left:4px; vertical-align:middle; }
  /* SDR-connected badge in the aircraft header */
  .sdrbadge { font-size:11px; font-weight:700; padding:2px 7px; border-radius:7px;
              background:#3a1f23; color:#ffb3bd; }      /* default: not connected */
  .sdrbadge.on  { background:#1f7a44; color:#eafff1; }  /* dongle present */
  .sdrbadge.unknown { background:#222633; color:var(--mut); }
  .howlbtn { background:#1a2535; color:#8bb8e8; border:1px solid #2a3f5a; border-radius:7px;
             padding:2px 9px; font-size:12px; font-weight:600; cursor:pointer; line-height:1.6; }
  .howlbtn:active { background:#223047; }
  .howllast { font-size:11px; color:var(--mut); }
  /* compact range slider inline in the aircraft header */
  .acrangeslider { -webkit-appearance:none; appearance:none; width:80px; height:4px; background:var(--line);
                   border-radius:2px; border:none; min-height:unset; padding:0; cursor:pointer; vertical-align:middle; }
  .acrangeslider::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px;
    border-radius:50%; background:var(--accent); cursor:pointer; }
  /* mode toggle in main header */
  .modebtn { font-size:12px; font-weight:700; padding:3px 10px; border-radius:7px; cursor:pointer; min-height:unset;
             background:#1b2535; color:#8bb8e8; border:1px solid #2a3f5a; width:auto; }
  .modebtn.home { background:#1f3a1f; color:#9effa0; border-color:#2a5a2a; }
  /* home/plane mode visibility */
  body.homemode #aircraftPanel { display:none; }
  body.planemode header .pill.hide-sm { display:none; }
  body.planemode #homeSection { display:none; }
  /* clickable flight number */
  .flightlink { color:var(--accent); text-decoration:none; }
  .flightlink:hover { text-decoration:underline; }
  /* selected aircraft row */
  .actable tbody tr.selected td { background:#1b2a3a; }
  /* metrics list section headers + current-value readout */
  .metrics-head { font-size:10px; font-weight:700; text-transform:uppercase; color:var(--mut); letter-spacing:.06em; margin:8px 0 3px; }
  .metrics label .curval { float:right; color:#7ec8e3; font-size:10px; opacity:.8; }
  /* outdoor weather strip */
  #weatherStrip { display:flex; flex-wrap:wrap; gap:6px 14px; padding:6px 14px; background:#10141c;
    border-bottom:1px solid var(--line); font-size:12px; color:#9aa3b5; align-items:center; }
  #weatherStrip .witem { display:flex; align-items:center; gap:4px; white-space:nowrap; }
  #weatherStrip .witem strong { color:#cfd5e3; }
  #weatherStrip .wsrc { margin-left:auto; color:#556; font-size:10px; }
  .windArrow { display:inline-block; font-size:14px; line-height:1; }
  /* Leaflet weather control */
  .leaflet-weather-ctrl { background:rgba(14,17,23,0.82); color:#cfd5e3; padding:6px 8px;
    border-radius:6px; font-size:11px; line-height:1.6; pointer-events:none; }
  .leaflet-weather-ctrl .wrow { display:flex; align-items:center; gap:5px; }
  @media (max-width: 820px) { .acpanel { margin:10px 10px 0; } #acmap { flex-basis:100%; height:300px; }
    #pathSide { flex-basis:100%; height:240px; width:100%; border-right:none; border-bottom:1px solid var(--line); }
    .actablewrap { border-left:none; border-top:1px solid var(--line); } }
</style>
</head>
<body>
<header>
  <button id="menu" class="iconbtn" aria-label="Menu">☰</button>
  <h1>🌫️ Air Monitor</h1>
  <button type="button" id="modeBtn" class="modebtn" title="Toggle home/plane mode">🏠 Home</button>
  <span class="pill"><span id="livedot" class="dot"></span><span id="livetxt" class="hide-sm">connecting…</span></span>
  <span class="pill" id="devmode" title="Sensor device mode"></span>
  <span class="grow"></span>
  <span class="pill hide-sm" id="stats"></span>
  <button id="fs" class="iconbtn" aria-label="Fullscreen">⛶</button>
</header>

<div class="backdrop" id="backdrop"></div>
<div id="batwarn">🔋 Battery low</div>

<div id="aircraftPanel" class="acpanel">
  <div class="achead" id="acHead">
    <h2>✈ Aircraft</h2>
    <span class="account" id="acCount">—</span>
    <input type="range" id="acRangeHead" min="0.5" max="20" step="0.5" class="acrangeslider" title="Range" />
    <span class="acrange" id="acRangeLbl"></span>
    <span class="sdrbadge" id="sdrBadge" title="RTL-SDR dongle">SDR —</span>
    <button type="button" class="howlbtn" id="howlBtn" title="Mark: I heard the howl">🔊 Heard it howl</button>
    <span class="howllast" id="howlLast"></span>
    <span class="acchev">▾</span>
  </div>
  <div class="acbody">
    <canvas id="pathSide" width="360" height="360" title="Side view — altitude cross-section (W←→E)"></canvas>
    <div id="acmap"></div>
    <div class="actablewrap">
      <table class="actable">
        <thead><tr><th></th><th>Flight</th><th>Airline</th><th>Kind</th><th>Model</th><th>Wt</th><th>Age</th><th>Alt (ft)</th><th>Spd (kt)</th><th>Dist (km)</th><th title="Bearing from station">Dir °</th><th></th></tr></thead>
        <tbody id="acRows"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="weatherStrip" style="display:none"></div>

<div class="wrap">
  <div class="controls" id="drawer">
    <section>
      <h2>Time range</h2>
      <label>Window</label>
      <select id="range">
        <option value="900">Last 15 min</option>
        <option value="1800">Last 30 min</option>
        <option value="3600">Last hour</option>
        <option value="21600">Last 6 hours</option>
        <option value="86400" selected>Last 24 hours</option>
        <option value="604800">Last 7 days</option>
        <option value="2592000">Last 30 days</option>
        <option value="custom">Custom…</option>
      </select>
      <div id="customRange" style="display:none">
        <label>From</label><input type="datetime-local" id="from" />
        <label>To</label><input type="datetime-local" id="to" />
      </div>
      <select id="liveintvl" title="Dashboard refresh interval" style="margin-top:8px">
        <option value="0">Live (WS)</option>
        <option value="60">Every 1 min</option>
        <option value="300">Every 5 min</option>
        <option value="900">Every 15 min</option>
        <option value="3600">Every 1 hr</option>
      </select>
    </section>

    <section>
      <h2>Metrics</h2>
      <div class="metrics" id="metrics"></div>
    </section>

    <section id="homeSection">
      <h2>Home state</h2>
      <div class="events-grid" id="toggles"></div>
      <label style="margin-top:14px">💨 Ventilation — <span id="ventVal">0%</span></label>
      <input type="range" id="vent" min="0" max="100" step="5" value="0" class="slider" />
      <div class="stat" id="evstat"></div>
    </section>

    <section>
      <h2>Sensor device</h2>
      <div class="stat" id="devstat">no device seen yet</div>
      <div class="stat" id="devpending"></div>
    </section>

    <section>
      <h2>Add marker</h2>
      <label>Note (e.g. "fell on the ground", "moved 2 m")</label>
      <input type="text" id="markerText" placeholder="type a note…" maxlength="200" />
      <div class="row" style="margin-top:10px">
        <button id="markerAdd">Add marker</button>
      </div>
    </section>
  </div>

  <div id="charts"></div>
</div>

<script>
// ---- friendly labels + grouping so related metrics share a chart ----------
// a:2 puts the metric on the chart's right-hand (secondary) y-axis — used when
// two related series share a chart but have very different units/scales.
const META = {
  pm1:{g:'Particulates (µg/m³)',n:'PM1'}, pm25:{g:'Particulates (µg/m³)',n:'PM2.5'},
  pm4:{g:'Particulates (µg/m³)',n:'PM4'}, pm10:{g:'Particulates (µg/m³)',n:'PM10'},
  // All gases on one chart: levels/indices/mV on the left, Rs (Ω) on the right.
  co2:{g:'Gases',n:'CO₂ ppm'},
  voc:{g:'Gases',n:'VOC index'}, nox:{g:'Gases',n:'NOx index'},
  co_mv:{g:'Gases',n:'CO mV'}, hcho_mv:{g:'Gases',n:'HCHO mV'},
  co_rs:{g:'Gases',n:'CO Rs',a:2}, hcho_rs:{g:'Gases',n:'HCHO Rs',a:2},
  temp:{g:'Temp / Humidity',n:'Temp °C'}, rh:{g:'Temp / Humidity',n:'RH %'},
  bme_temp:{g:'Temp / Humidity',n:'BME temp °C'}, bme_rh:{g:'Temp / Humidity',n:'BME RH %'},
  pressure_hpa:{g:'Pressure (hPa)',n:'Pressure'},
  lux:{g:'Light (lux)',n:'Light'},
  noise_dba:{g:'Noise (dB)',n:'dB(A)'}, noise_spl:{g:'Noise (dB)',n:'SPL'},
  noise_dbfs:{g:'Noise (dBFS)',n:'dBFS'},
  // Motion: rumble (left) + accel magnitude (right) on one chart
  rumble:{g:'Motion (m/s²)',n:'Rumble RMS'}, rumble_peak:{g:'Motion (m/s²)',n:'Rumble peak'},
  accel_mag:{g:'Motion (m/s²)',n:'|a| magnitude',a:2},
  // Soil: moisture % (left) + raw mV (right) on one chart
  soil_pct:{g:'Soil',n:'Soil %'}, soil_mv:{g:'Soil',n:'Soil mV',a:2},
  bat_raw_mv:{g:'Battery',n:'Bat raw mV'}, bat_v:{g:'Battery',n:'Bat V'}, bat_pct:{g:'Battery',n:'Bat %'},
};
// Per-chart axis titles for the dual-axis groups (left = y, right = y2).
const GROUP_AXES = {
  'Gases':         { y:'ppm / index / mV', y2:'Rs (Ω)' },
  'Motion (m/s²)': { y:'rumble m/s²', y2:'|a| m/s²' },
  'Soil':          { y:'%', y2:'mV' },
};
// Chart stacking order (top→bottom). Battery is always forced last regardless.
const GROUP_ORDER = [
  'Particulates (µg/m³)','Gases','Temp / Humidity','Pressure (hPa)',
  'Light (lux)','Noise (dB)','Noise (dBFS)','Soil','Motion (m/s²)',
];
function groupRank(g) {
  if (g === 'Battery') return 1e6;
  const i = GROUP_ORDER.indexOf(g);
  return i < 0 ? 5e5 : i;
}

// Weather metric metadata (variables returned by /api/weather).
// Groups that overlap with META (e.g. 'Particulates') share the same Plotly chart.
const WEATHER_META = {
  temperature_2m:       { g:'Temp / Humidity', n:'Outdoor °C' },
  apparent_temperature: { g:'Temp / Humidity', n:'Feels like °C' },
  dew_point_2m:         { g:'Temp / Humidity', n:'Dew point °C' },
  relative_humidity_2m: { g:'Temp / Humidity', n:'Outdoor RH %' },
  pressure_msl:         { g:'Pressure (hPa)', n:'Outdoor hPa' },
  precipitation:        { g:'Precipitation (mm)', n:'Precip mm' },
  rain:                 { g:'Precipitation (mm)', n:'Rain mm' },
  rain_live:            { g:'Precipitation (mm)', n:'Rain live mm' },
  cloud_cover:          { g:'Cloud & Radiation', n:'Cloud %' },
  shortwave_radiation:  { g:'Cloud & Radiation', n:'Solar W/m²' },
  global_radiation:     { g:'Cloud & Radiation', n:'Global rad W/m²' },
  direct_radiation:     { g:'Cloud & Radiation', n:'Direct W/m²' },
  wind_speed_10m:       { g:'Wind', n:'Wind m/s' },
  wind_gusts_10m:       { g:'Wind', n:'Gusts m/s' },
  wind_direction_10m:   { g:'Wind', n:'Wind dir °' },
  pm10:                 { g:'Particulates (µg/m³)', n:'Outdoor PM10' },
  pm2_5:                { g:'Particulates (µg/m³)', n:'Outdoor PM2.5' },
  european_aqi:         { g:'Air Quality Index', n:'EU AQI' },
  no2:                  { g:'Air Quality Index', n:'NO₂ µg/m³' },
  o3:                   { g:'Air Quality Index', n:'O₃ µg/m³' },
  uv_index:             { g:'Air Quality Index', n:'UV index' },
};

let live = true, selected = new Set(), allMetrics = [];
let dataCache = [];   // current query result (array of flat records)
let weatherCache = [];
let eventsCache = [];
let _allWeatherMetrics = [], _selectedWeather = new Set();

const $ = s => document.querySelector(s);

function fmtRange() {
  const sel = $('#range').value;
  if (sel === 'custom') {
    const f = $('#from').value ? Math.floor(new Date($('#from').value).getTime()/1000) : null;
    const t = $('#to').value ? Math.floor(new Date($('#to').value).getTime()/1000) : null;
    return { since: f, until: t };
  }
  return { since: Math.floor(Date.now()/1000) - parseInt(sel), until: null };
}

async function loadMetrics() {
  const [sensorMs, weatherMs] = await Promise.all([
    (await fetch('/api/metrics')).json(),
    fetch('/api/weather/metrics').then(r => r.json()).catch(() => []),
  ]);
  allMetrics = sensorMs;
  _allWeatherMetrics = weatherMs.map(m => m.name).filter(m => WEATHER_META[m]);
  if (selected.size === 0) {
    allMetrics.forEach(m => selected.add(m));
    _allWeatherMetrics.forEach(m => _selectedWeather.add(m));
  }
  renderMetricsList();
}

function renderMetricsList() {
  const box = $('#metrics'); if (!box) return;
  box.innerHTML = '';

  const makeRow = (m, isWeather) => {
    const lbl = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = isWeather ? _selectedWeather.has(m) : selected.has(m);
    cb.onchange = () => {
      if (isWeather) { cb.checked ? _selectedWeather.add(m) : _selectedWeather.delete(m); }
      else           { cb.checked ? selected.add(m) : selected.delete(m); }
      render();
    };
    const meta = isWeather ? WEATHER_META[m] : META[m];
    const name = meta?.n || m;
    const cur  = isWeather ? (_weatherLatest[m] ?? null)
                           : (dataCache.length ? (dataCache.at(-1)[m] ?? null) : null);
    const curStr = cur != null ? ` <span class="curval">${typeof cur === 'number' ? cur.toFixed(cur < 10 ? 1 : 0) : cur}</span>` : '';
    lbl.appendChild(cb);
    lbl.innerHTML += ` ${name}${curStr}`;
    return lbl;
  };

  if (allMetrics.length) {
    const h = document.createElement('div');
    h.className = 'metrics-head'; h.textContent = 'Sensor';
    box.appendChild(h);
    allMetrics.forEach(m => box.appendChild(makeRow(m, false)));
  }
  if (_allWeatherMetrics.length) {
    const h = document.createElement('div');
    h.className = 'metrics-head'; h.textContent = 'Outdoor weather';
    box.appendChild(h);
    _allWeatherMetrics.forEach(m => box.appendChild(makeRow(m, true)));
  }
}

async function query() {
  const { since, until } = fmtRange();
  const qs = new URLSearchParams();
  if (since) qs.set('since', since);
  if (until) qs.set('until', until);
  [dataCache, eventsCache, weatherCache] = await Promise.all([
    (await fetch('/api/readings?' + qs)).json(),
    (await fetch('/api/events?' + qs)).json(),
    fetch('/api/weather?' + qs + '&limit=5000').then(r => r.json()).catch(() => []),
  ]);
  render();
  restoreToggleStates();
  checkBattery();
  loadStats();
  renderMetricsList();   // refresh current-value readout
}

async function loadStats() {
  const s = await (await fetch('/api/stats')).json();
  const span = (s.first_ts && s.last_ts)
    ? `${new Date(s.first_ts*1000).toLocaleString()} → ${new Date(s.last_ts*1000).toLocaleString()}`
    : 'no data yet';
  $('#stats').textContent = `${s.readings} readings · ${s.events} events · ${span}`;
}

// group selected metrics by their chart group, one Plotly chart per group
function render() {
  // Each entry: { m, isWeather }
  const groups = {};
  [...selected].forEach(m => {
    const g = META[m]?.g || m;
    (groups[g] ||= []).push({ m, isWeather:false });
  });
  [..._selectedWeather].forEach(m => {
    const wm = WEATHER_META[m]; if (!wm) return;
    (groups[wm.g] ||= []).push({ m, isWeather:true });
  });

  const host = $('#charts');
  [...host.children].forEach(c => { if (!groups[c.dataset.group]) c.remove(); });

  // Flyover annotations from aircraft path history
  const { since, until } = fmtRange();
  const flyovers = _computeFlyovers(since, until);
  const flyShapes = flyovers.map(f => ({
    type:'line', x0:new Date(f.ts*1000), x1:new Date(f.ts*1000), yref:'paper', y0:0, y1:1,
    line:{color:'rgba(126,200,227,.35)', width:1, dash:'dot'},
  }));
  const flyAnnot = flyovers.map(f => ({
    x:new Date(f.ts*1000), y:0.98, yref:'paper',
    text:`${f.flight||f.hex} ${f.ascending ? '↗' : '↙'}`,
    showarrow:false, font:{size:8, color:'#7ec8e3'}, textangle:-90, xanchor:'left', yanchor:'top',
  }));

  Object.entries(groups).forEach(([g, mlist]) => {
    let div = [...host.children].find(c => c.dataset.group === g);
    if (!div) {
      div = document.createElement('div');
      div.className = 'chart'; div.dataset.group = g; div.style.height = '260px';
      host.appendChild(div);
    }
    const hasRight = mlist.some(({m, isWeather}) => (isWeather ? WEATHER_META[m] : META[m])?.a === 2);
    const traces = mlist.map(({m, isWeather}) => {
      const meta = isWeather ? WEATHER_META[m] : META[m];
      const cache = isWeather ? weatherCache : dataCache;
      const tsKey = isWeather ? 'valid_ts' : 'ts';
      return {
        x: cache.map(r => new Date(r[tsKey]*1000)),
        y: cache.map(r => r[m] ?? null),
        name: meta?.n || m, mode:'lines', line:{width:1.6}, connectgaps:false,
        yaxis: meta?.a === 2 ? 'y2' : 'y',
      };
    });
    const shapes = [
      ...eventsCache.map(e => ({
        type:'line', x0:new Date(e.ts*1000), x1:new Date(e.ts*1000), yref:'paper', y0:0, y1:1,
        line:{color:'rgba(255,200,80,.45)', width:1, dash:'dot'},
      })),
      ...flyShapes,
    ];
    const annotations = [
      ...eventsCache.map(e => ({
        x:new Date(e.ts*1000), y:1, yref:'paper', text:(e.label||e.kind), showarrow:false,
        font:{size:9, color:'#ffce6b'}, textangle:-90, xanchor:'left', yanchor:'top',
      })),
      ...flyAnnot,
    ];
    const ax = GROUP_AXES[g] || {};
    const layout = {
      title:{text:g, font:{size:13, color:'#cfd5e3'}, x:0.01},
      paper_bgcolor:'#171a21', plot_bgcolor:'#171a21',
      font:{color:'#9aa3b5', size:11},
      margin:{l:48, r:hasRight ? 52 : 14, t:30, b:30}, height:260,
      xaxis:{gridcolor:'#252a35'},
      yaxis:{gridcolor:'#252a35', title:{text:ax.y || '', font:{size:10}}},
      showlegend:true, legend:{orientation:'h', y:-0.18, font:{size:10}},
      shapes, annotations,
    };
    if (hasRight) {
      layout.yaxis2 = { overlaying:'y', side:'right', gridcolor:'transparent',
                        title:{text:ax.y2 || '', font:{size:10}} };
    }
    Plotly.react(div, traces, layout, {displayModeBar:false, responsive:true});
  });

  // keep charts in a stable order, Battery always pinned to the bottom
  [...host.children]
    .sort((a, b) => groupRank(a.dataset.group) - groupRank(b.dataset.group))
    .forEach(c => host.appendChild(c));
}

// ---- outdoor weather (public providers) -----------------------------------
let _weatherLatest = {};   // key → latest numeric value from weather API

function _pickFirst(obj, ...keys) {
  for (const k of keys) if (obj[k] != null) return obj[k];
  return null;
}

function renderWeather() {
  const w = _weatherLatest;
  const strip = $('#weatherStrip');
  if (!strip) return;
  const temp    = _pickFirst(w, 'temperature_2m','temp');
  const rh      = _pickFirst(w, 'relative_humidity_2m','relative_humidity','humidity');
  const wspd    = _pickFirst(w, 'wind_speed_10m','wind_speed');
  const wdir    = _pickFirst(w, 'wind_direction_10m','wind_direction','wind_angle','winddir');
  const precip  = _pickFirst(w, 'precipitation','rain','rain_live');
  const cloud   = _pickFirst(w, 'cloud_cover');
  const rad     = _pickFirst(w, 'shortwave_radiation','global_radiation','solarRadiation','direct_radiation');
  const src     = w._source || '';

  if (temp == null && wspd == null && rh == null) { strip.style.display = 'none'; return; }

  // Wind direction: rotate arrow emoji
  const windArrow = wdir != null
    ? `<span class="windArrow" style="display:inline-block;transform:rotate(${Math.round(wdir)}deg)" title="${Math.round(wdir)}°">↑</span>`
    : '';

  const items = [];
  if (temp    != null) items.push(`<span class="witem">🌡️ <strong>${temp.toFixed(1)}°C</strong></span>`);
  if (rh      != null) items.push(`<span class="witem">💧 <strong>${Math.round(rh)}%</strong></span>`);
  if (wspd    != null) items.push(`<span class="witem">💨 ${windArrow} <strong>${wspd.toFixed(1)} m/s</strong></span>`);
  if (precip  != null) items.push(`<span class="witem">🌧️ <strong>${precip.toFixed(1)} mm</strong></span>`);
  if (cloud   != null) items.push(`<span class="witem">☁️ <strong>${Math.round(cloud)}%</strong></span>`);
  if (rad     != null) items.push(`<span class="witem">☀️ <strong>${Math.round(rad)} W/m²</strong></span>`);
  if (src)             items.push(`<span class="wsrc">${src}</span>`);

  strip.innerHTML = items.join('');
  strip.style.display = 'flex';

  // Update map weather control if it exists
  const ctrl = document.getElementById('mapWeatherCtrl');
  if (ctrl) {
    const dir = wdir != null ? Math.round(wdir) : null;
    const arrow = dir != null
      ? `<span style="display:inline-block;transform:rotate(${dir}deg);font-size:16px">↑</span> `
      : '';
    ctrl.innerHTML = [
      wspd != null  ? `<div class="wrow">${arrow}<strong>${wspd.toFixed(1)} m/s</strong> ${dir != null ? dir+'°' : ''}</div>` : '',
      precip != null && precip > 0 ? `<div class="wrow">🌧️ ${precip.toFixed(1)} mm</div>` : '',
      cloud  != null ? `<div class="wrow">☁️ ${Math.round(cloud)}%</div>` : '',
      rad    != null ? `<div class="wrow">☀️ ${Math.round(rad)} W/m²</div>` : '',
    ].filter(Boolean).join('');
  }
}

async function loadWeather() {
  try {
    const since = Math.floor(Date.now()/1000) - 3600;
    const rows = await (await fetch(`/api/weather?since=${since}&limit=200`)).json();
    if (!rows.length) return;
    // Take the most recent row overall; merge with any more-recent per-key values
    // from any source so the displayed values are as fresh as possible.
    const sorted = rows.slice().sort((a, b) => (a.valid_ts||0) - (b.valid_ts||0));
    const merged = {};
    for (const r of sorted) Object.assign(merged, r);
    _weatherLatest = merged;
    _weatherLatest._source = sorted.at(-1)?.source || '';
    renderWeather();
  } catch (_) {}
}

// ---- live updates over WebSocket ------------------------------------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen  = () => { $('#livedot').classList.add('live'); $('#livetxt').textContent = 'live'; };
  ws.onclose = () => { $('#livedot').classList.remove('live'); $('#livetxt').textContent = 'reconnecting…'; setTimeout(connectWS, 2000); };
  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'aircraft') { renderSdr(msg.sdr); updateAircraft(msg.data); return; }
    if (msg.type === 'weather')  { Object.assign(_weatherLatest, msg.data); _weatherLatest._source = msg.data.source || _weatherLatest._source; renderWeather(); return; }
    if (!live) return;
    if (msg.type === 'reading') { dataCache.push(msg.data); trimToWindow(); render(); checkBattery(); loadStats(); }
    if (msg.type === 'device')  { deviceState = msg.data; renderDevice(); }
    if (msg.type === 'event')   {
      eventsCache.push(msg.data); render();
      // reflect a toggle flipped from another client/device
      const t = TOGGLES.find(t => t.kind === msg.data.kind);
      if (t) { toggleState[t.kind] = (msg.data.label === t.on); renderToggles(); }
      if (msg.data.kind === 'ventilation') restoreVent();
    }
  };
}
function trimToWindow() {
  const { since } = fmtRange();
  if (since) dataCache = dataCache.filter(r => r.ts >= since);
}

// ---- home-state toggles ---------------------------------------------------
// Each toggle flips between two states and logs an event with the new label.
const TOGGLES = [
  { kind:'door',        on:'open',  off:'close', onTxt:'🚪 Door open',  offTxt:'🚪 Door closed' },
  { kind:'occupancy',   on:'home',  off:'away',  onTxt:'🏠 Home',       offTxt:'🚶 Away' },
  { kind:'heating',     on:'on',    off:'off',   onTxt:'🔥 Heating on', offTxt:'🔥 Heating off' },
  { kind:'pc',          on:'on',    off:'off',   onTxt:'💻 PC on',      offTxt:'💻 PC off' },
  { kind:'soundsys',    on:'on',    off:'off',   onTxt:'🔊 Sound on',   offTxt:'🔊 Sound off' },
  { kind:'sleep',       on:'sleep', off:'wake',  onTxt:'😴 Sleeping',   offTxt:'☀️ Awake' },
];
const toggleState = {};   // kind -> bool (on)

function renderToggles() {
  const grid = $('#toggles'); grid.innerHTML = '';
  TOGGLES.forEach(t => {
    const on = !!toggleState[t.kind];
    const b = document.createElement('button');
    b.className = 'toggle' + (on ? ' on' : '');
    b.textContent = on ? t.onTxt : t.offTxt;
    b.onclick = async () => {
      const nowOn = !toggleState[t.kind];
      toggleState[t.kind] = nowOn;
      renderToggles();
      const ev = await (await fetch('/api/event', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ kind:t.kind, label: nowOn ? t.on : t.off }),
      })).json();
      $('#evstat').textContent = `logged: ${ev.kind}/${ev.label} @ ${new Date(ev.ts*1000).toLocaleTimeString()}`;
    };
    grid.appendChild(b);
  });
}

// Restore each toggle to whatever its most recent event in the window was.
function restoreToggleStates() {
  TOGGLES.forEach(t => {
    const last = eventsCache.filter(e => e.kind === t.kind).sort((a,b) => b.ts - a.ts)[0];
    toggleState[t.kind] = last ? (last.label === t.on) : false;
  });
  renderToggles();
  restoreVent();
}

// ---- ventilation slider (0–100%) ------------------------------------------
function restoreVent() {
  const last = eventsCache.filter(e => e.kind === 'ventilation').sort((a,b) => b.ts - a.ts)[0];
  const pct = last ? parseInt(last.label) || 0 : 0;
  $('#vent').value = pct;
  $('#ventVal').textContent = pct + '%';
}

// ---- low-battery warning --------------------------------------------------
const BAT_LOW_PCT = 15, BAT_LOW_V = 3.3;
function checkBattery() {
  let pct = null, v = null;
  for (let i = dataCache.length - 1; i >= 0; i--) {     // newest reading with battery data
    const r = dataCache[i];
    if (r.bat_pct != null) { pct = r.bat_pct; v = r.bat_v ?? null; break; }
    if (r.bat_v   != null) { v = r.bat_v; break; }
  }
  const low = (pct != null && pct < BAT_LOW_PCT) ||
              (pct == null && v != null && v < BAT_LOW_V);
  const el = $('#batwarn');
  el.classList.toggle('show', low);
  if (low) el.textContent = `🔋 Battery low — ${pct != null ? pct.toFixed(0) + '%' : v.toFixed(2) + ' V'} · charge soon`;
}

let deviceState = null;   // {dev,mode,last_seen,buffered,pending}
const OFFLINE_AFTER = 35 * 60;   // > 2x the 15-min sync interval

function renderDevice() {
  const el = $('#devmode'), st = $('#devstat'), pend = $('#devpending');
  if (!deviceState) { if (el) el.textContent = ''; return; }
  const age = Math.floor(Date.now()/1000) - (deviceState.last_seen || 0);
  const offline = age > OFFLINE_AFTER;
  const mode = offline ? 'offline' : (deviceState.mode || 'normal');
  el.className = 'pill';
  el.innerHTML = `<span class="badge ${mode}${deviceState.pending ? ' pending' : ''}">${mode.toUpperCase()}</span>`;
  st.textContent = `${deviceState.dev} · ${deviceState.buffered ?? '?'} buffered · seen ${age}s ago`;
  if (pend) pend.textContent = deviceState.pending
    ? `pending: switch to ${deviceState.pending} (applies at next sync)` : '';
}

// Registration prefix → country flag emoji
const REG_FLAGS = {
  // 3-char
  'A6C':'🇦🇪','A9C':'🇧🇭','A40':'🇴🇲',
  // 2-char
  PH:'🇳🇱',EI:'🇮🇪',OE:'🇦🇹',HB:'🇨🇭',LN:'🇳🇴',SE:'🇸🇪',OH:'🇫🇮',OY:'🇩🇰',
  EC:'🇪🇸',CS:'🇵🇹',TS:'🇹🇳',TC:'🇹🇷',OD:'🇱🇧',SU:'🇪🇬',ET:'🇪🇹',ZS:'🇿🇦',
  VH:'🇦🇺',ZK:'🇳🇿',HL:'🇰🇷',JA:'🇯🇵',VT:'🇮🇳',AP:'🇵🇰',EP:'🇮🇷',RP:'🇵🇭',
  HS:'🇹🇭',PK:'🇮🇩','9M':'🇲🇾','9V':'🇸🇬',LZ:'🇧🇬',OK:'🇨🇿',SP:'🇵🇱',HA:'🇭🇺',
  YR:'🇷🇴',YU:'🇷🇸',OM:'🇸🇰','9A':'🇭🇷','4X':'🇮🇱',HZ:'🇸🇦',A6:'🇦🇪','7T':'🇩🇿',
  LY:'🇱🇹',ES:'🇪🇪',YL:'🇱🇻',UR:'🇺🇦',EK:'🇦🇲','4K':'🇦🇿',SX:'🇬🇷',
  // 1-char
  G:'🇬🇧',F:'🇫🇷',D:'🇩🇪',I:'🇮🇹',N:'🇺🇸',C:'🇨🇦',B:'🇨🇳',
};
function _regFlag(reg) {
  if (!reg) return '';
  const r = (reg || '').toUpperCase().replace(/-/g,'');
  for (const len of [3,2,1]) { const f=REG_FLAGS[r.slice(0,len)]; if (f) return f; }
  return '';
}

// Leaflet polylines for historical paths overlaid on the map
let _mapPathLines = {};

function _pathColor(p) {
  const w = ICAO_MTOW[(p.type||'').toUpperCase()];
  if (w !== undefined) {
    if (w >= 300) return '#ff6b6b';
    if (w >= 100) return '#ffa96b';
    if (w >= 40)  return '#ffd76b';
    return '#a8e6a3';
  }
  return _hexColor(p.hex || '');
}

function drawMapPaths() {
  if (!acMap) return;
  // remove old lines that are no longer in _pathData
  const activeHex = new Set(_pathData.map(p => p.hex));
  Object.keys(_mapPathLines).forEach(h => {
    if (!activeHex.has(h)) { acMap.removeLayer(_mapPathLines[h]); delete _mapPathLines[h]; }
  });
  const groups = _groupByHex(_pathData);
  for (const [hex, pts] of Object.entries(groups)) {
    const lls = pts.map(p => [p.lat, p.lon]);
    const col = _pathColor(pts[0]);
    if (_mapPathLines[hex]) {
      _mapPathLines[hex].setLatLngs(lls).setStyle({color: col});
    } else {
      _mapPathLines[hex] = L.polyline(lls, {color:col, weight:1.5, opacity:0.55}).addTo(acMap);
    }
  }
}

let _pathData = [];

async function loadFlightPaths() {
  try {
    // Fetch 2× range so drawPredPaths() has history for incoming planes
    const resp = await fetch(`/api/aircraft/paths?range_km=${acRange * 2}`);
    if (!resp.ok) return;
    _pathData = (await resp.json()).points || [];
  } catch (_) { return; }
  drawMapPaths();
  drawSideView();
  drawPredPaths();
}

function _hexColor(hex) {
  let h = 0;
  for (let i = 0; i < hex.length; i++) h = ((h * 31) + hex.charCodeAt(i)) >>> 0;
  return `hsl(${h % 360},60%,62%)`;
}

function _groupByHex(pts) {
  const m = {};
  for (const p of pts) { if (!m[p.hex]) m[p.hex] = []; m[p.hex].push(p); }
  for (const v of Object.values(m)) v.sort((a, b) => a.ts - b.ts);
  return m;
}


function drawSideView() {
  const cv = $('#pathSide'); if (!cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.fillStyle = '#0e1117'; ctx.fillRect(0, 0, W, H);
  if (!acHome) return;
  const [hLat, hLon] = acHome;
  const lonKm = Math.cos(hLat * Math.PI / 180) * 111.32;
  const PAD_L = 24, PAD_R = 8, PAD_T = 14, PAD_B = 16;
  const drawW = W - PAD_L - PAD_R, drawH = H - PAD_T - PAD_B;

  const maxAlt = _pathData.length ? Math.max(5000, ..._pathData.map(p => p.alt_baro || 0)) : 5000;
  const ceilAlt = Math.ceil(maxAlt / 5000) * 5000;

  // west=left, east=right: +dx_km east → +x right
  function toXY(lon, alt) {
    const dx_km = (lon - hLon) * lonKm;
    const x = PAD_L + drawW/2 + dx_km / acRange * (drawW/2);
    const y = PAD_T + drawH - (alt || 0) / ceilAlt * drawH;
    return [x, y];
  }

  // altitude grid
  const step = ceilAlt <= 10000 ? 2000 : ceilAlt <= 20000 ? 5000 : 10000;
  for (let a = 0; a <= ceilAlt; a += step) {
    const y = PAD_T + drawH - a / ceilAlt * drawH;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W-PAD_R, y);
    ctx.strokeStyle = 'rgba(255,255,255,.07)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.28)'; ctx.font = '8px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(a === 0 ? '0' : (a/1000)+'k', PAD_L-2, y+3);
  }

  // "you are here" vertical
  const cx = PAD_L + drawW/2;
  ctx.strokeStyle = 'rgba(78,161,255,.45)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(cx, PAD_T); ctx.lineTo(cx, H-PAD_B); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(78,161,255,.65)'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('you', cx, H-2);

  // axis labels
  ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.font = '9px sans-serif';
  ctx.textAlign = 'left';  ctx.fillText('W', PAD_L+2, PAD_T-3);
  ctx.textAlign = 'right'; ctx.fillText('E', W-PAD_R-2, PAD_T-3);
  ctx.textAlign = 'left';  ctx.fillText('ft', 0, PAD_T+3);

  if (!_pathData.length) {
    ctx.fillStyle = 'rgba(255,255,255,.2)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('no local data yet', W/2, H/2+4);
  } else {
    for (const [hex, pts] of Object.entries(_groupByHex(_pathData))) {
      const validPts = pts.filter(p => p.alt_baro != null);
      if (!validPts.length) continue;
      ctx.strokeStyle = _hexColor(hex); ctx.lineWidth = 1.5; ctx.beginPath();
      let first = true;
      for (const p of validPts) {
        const [x, y] = toXY(p.lon, p.alt_baro);
        first ? ctx.moveTo(x, y) : ctx.lineTo(x, y); first = false;
      }
      ctx.stroke();
    }
  }

  // live aircraft overlay (current snapshot)
  const live = (acData || []).filter(a => a.lat != null && a.lon != null && a.alt_baro != null
                                       && a.distance_km != null && a.distance_km <= acRange);
  for (const a of live) {
    const [x, y] = toXY(a.lon, a.alt_baro);
    const sz = planeSize(a.type, a.category);
    ctx.font = `${sz}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(((a.track||0) - 45) * Math.PI/180);
    ctx.globalAlpha = a.source === 'public' ? 0.4 : 1.0;
    ctx.fillText('✈️', 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1.0;
  }
  ctx.textBaseline = 'alphabetic';
}

function updateAircraft(list) { acData = Array.isArray(list) ? list : []; renderAircraft(); }

// ── Smooth icon interpolation ───────────────────────────────────────────────
// Runs at 3 fps between ADS-B updates to move icons along the polynomial curve.
function _startAnimLoop() {
  setInterval(() => {
    if (!acMap) return;
    const now = Date.now() / 1000;
    for (const [hex, st] of Object.entries(_acAnimState)) {
      if (!acIcons[hex]) continue;
      const age = now - st.reportedAt;
      if (age > 30) continue;   // stale — don't interpolate past ~half a poll cycle
      let lat, lon;
      if (st.cLat && st.cLon && st.t0 != null) {
        lat = polyEval(st.cLat, now - st.t0);
        lon = polyEval(st.cLon, now - st.t0);
      } else if (st.track != null && st.gs) {
        const distKm = st.gs * (age / 3600) * 1.852;
        [lat, lon] = destPoint(st.lat, st.lon, st.track, distKm);
      } else {
        continue;
      }
      // Sanity: don't teleport more than 10 km from last known position
      if (haversineKm(st.lat, st.lon, lat, lon) > 10) continue;
      acIcons[hex].setLatLng([lat, lon]);
    }
  }, 333);   // ~3 fps
}

const CARGO_PREFIXES = new Set(['FDX','UPS','BOX','MPH','CLX','TFL','ATN','GTI','NCR','ABX','PAC']);

function acAirline(flight) {
  const m = /^([A-Z]{2,3})/.exec((flight || '').trim());
  if (!m) return '';
  return ICAO_AIRLINES[m[1]] || m[1];
}

function acKind(category, flight) {
  const prefix = /^([A-Z]{2,3})/.exec((flight || '').trim())?.[1] ?? '';
  if (CARGO_PREFIXES.has(prefix)) return 'Cargo';
  const c = category || '';
  if (c === 'A7') return 'Helicopter';
  if (c === 'A5') return 'Heavy';
  if (c === 'A4' || c === 'A3') return 'Airliner';
  if (c === 'A2') return 'Small';
  if (c === 'A1') return 'Private';
  if (c === 'A6') return 'Military';
  if (c === 'B1') return 'Glider';
  if (c === 'B2') return 'Balloon';
  if (c === 'B4') return 'Ultralight';
  if (c === 'B6') return 'Drone';
  if (c === 'C1') return 'Emergency';
  if (c === 'C2') return 'Service';
  return '';
}

// ICAO type code → approximate MTOW in tonnes (common commercial types)
const ICAO_MTOW = {
  A318:68, A319:75, A320:78, A321:93, A19N:75, A20N:79, A21N:97,
  A332:233, A333:242, A338:251, A339:251, A359:280, A35K:316, A388:575,
  B732:58, B733:63, B734:68, B735:60, B736:66, B737:66, B738:80, B739:85,
  B37M:82, B38M:82, B39M:88, B3XM:88, B752:116, B753:124,
  B762:175, B763:181, B764:204, B772:298, B77L:299, B77W:352,
  B788:228, B789:254, B78X:254, B741:333, B742:377, B744:412, B748:448, B74F:447,
  E170:37, E175:38, E190:51, E195:52, E290:56, E295:61,
  CRJ2:24, CRJ7:33, CRJ9:38, CRJX:40, AT72:23, AT75:23, AT76:23, DH8D:30, SF34:14,
  C56X:9, C750:16, GLEX:45, GL5T:45,
};

function acWeight(type, category) {
  const w = ICAO_MTOW[(type || '').toUpperCase()];
  if (w !== undefined) return `~${w} t`;
  // Category-based fallback when exact MTOW not known
  const c = (category || '').toUpperCase();
  if (c === 'A5') return '>136 t';
  if (c === 'A4') return '~100 t';
  if (c === 'A3') return '~75 t';
  if (c === 'A2') return '~2 t';
  if (c === 'A1') return '<0.6 t';
  if (c === 'A7') return '~5 t';
  if (c === 'B6') return '<0.1 t';
  return '';
}

function acAge(year) {
  if (!year) return '';
  const age = 2026 - parseInt(year, 10);
  return (age >= 0 && age < 100) ? `${age} yr` : '';
}

// SDR dongle indicator: connected (green) / not connected (red) / unknown (grey).
function renderSdr(sdr) {
  const el = $('#sdrBadge'); if (!el) return;
  const c = sdr ? sdr.connected : null;
  el.classList.toggle('on', c === true);
  el.classList.toggle('unknown', c == null);
  el.textContent = c === true ? `SDR ✓${sdr.name ? ' ' + sdr.name : ''}`
                 : c === false ? 'SDR ✗' : 'SDR —';
  el.title = c === true ? `RTL-SDR connected${sdr.name ? ': ' + sdr.name : ''}`
           : c === false ? 'No RTL-SDR dongle detected on USB'
           : 'SDR status unknown';
}

function planeSize(type, category) {
  const w = ICAO_MTOW[(type || '').toUpperCase()];
  if (w !== undefined) {
    if (w >= 300) return 28;
    if (w >= 100) return 23;
    if (w >= 40)  return 19;
    return 15;
  }
  const c = category || '';
  if (c === 'A5') return 26;
  if (c === 'A4' || c === 'A3') return 21;
  if (c === 'A7') return 18;
  if (c === 'A2') return 16;
  return 15;
}

// Haversine distance in km between two lat/lon points (degrees)
function haversineKm(la1, lo1, la2, lo2) {
  const R = 6371, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Find the closest-approach moment for each aircraft in _pathData within the time window.
// Returns [{ts, flight, hex, ascending}] for planes that came within acRange/5 km (min 0.5 km).
function _computeFlyovers(since, until) {
  if (!acHome || !_pathData.length) return [];
  const [hLat, hLon] = acHome;
  const threshold = Math.max(0.5, acRange / 5);
  const grouped = _groupByHex(_pathData);
  const out = [];
  for (const [hex, pts] of Object.entries(grouped)) {
    const win = pts.filter(p => (!since || p.ts >= since) && (!until || p.ts <= until));
    if (!win.length) continue;
    let minD = Infinity, minI = -1;
    win.forEach((p, i) => {
      const d = haversineKm(hLat, hLon, p.lat, p.lon);
      if (d < minD) { minD = d; minI = i; }
    });
    if (minD > threshold) continue;
    // ascending/descending: compare alt of adjacent points around the closest one
    let trend = 0;
    if (minI > 0 && win[minI-1].alt_baro != null)       trend += (win[minI].alt_baro||0) - (win[minI-1].alt_baro||0);
    if (minI < win.length-1 && win[minI+1].alt_baro != null) trend += (win[minI+1].alt_baro||0) - (win[minI].alt_baro||0);
    out.push({ ts: win[minI].ts, flight: win[minI].flight, hex, ascending: trend > 0 });
  }
  return out;
}

// Great-circle destination point: start lat/lon (deg), bearing (deg), dist (km)
function destPoint(lat, lon, bearingDeg, distKm) {
  const R = 6371;
  const d = distKm / R;
  const b = bearingDeg * Math.PI / 180;
  const la = lat * Math.PI / 180, lo = lon * Math.PI / 180;
  const la2 = Math.asin(Math.sin(la)*Math.cos(d) + Math.cos(la)*Math.sin(d)*Math.cos(b));
  const lo2 = lo + Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(la), Math.cos(d) - Math.sin(la)*Math.sin(la2));
  return [la2 * 180/Math.PI, lo2 * 180/Math.PI];
}

// ── Polynomial regression (least-squares) ──────────────────────────────────
// Solves a dense n×n linear system using Gaussian elimination with partial pivoting.
function _gaussSolve(M, n) {
  for (let col = 0; col < n; col++) {
    let maxR = col;
    for (let r = col+1; r < n; r++) if (Math.abs(M[r][col]) > Math.abs(M[maxR][col])) maxR = r;
    [M[col], M[maxR]] = [M[maxR], M[col]];
    if (Math.abs(M[col][col]) < 1e-12) continue;
    for (let r = col+1; r < n; r++) {
      const f = M[r][col] / M[col][col];
      for (let j = col; j <= n; j++) M[r][j] -= f * M[col][j];
    }
  }
  const x = new Array(n).fill(0);
  for (let i = n-1; i >= 0; i--) {
    if (Math.abs(M[i][i]) < 1e-12) continue;
    x[i] = M[i][n] / M[i][i];
    for (let j = i-1; j >= 0; j--) M[j][n] -= M[j][i] * x[i];
  }
  return x;
}

// Returns polynomial coefficients [c0, c1, ..., cdeg] for y ≈ Σ ck * t^k.
function polyFit(ts, ys, deg) {
  const n = deg + 1, len = ts.length;
  // Build Gram matrix (A^T A) and vector (A^T y) for the normal equations
  const G = Array.from({length:n}, () => new Array(n+1).fill(0));
  for (let k = 0; k < len; k++) {
    const row = Array.from({length:n}, (_, i) => Math.pow(ts[k], i));
    for (let i = 0; i < n; i++) {
      G[i][n] += row[i] * ys[k];
      for (let j = 0; j < n; j++) G[i][j] += row[i] * row[j];
    }
  }
  return _gaussSolve(G, n);
}

function polyEval(c, t) {
  let v = 0;
  for (let i = c.length-1; i >= 0; i--) v = v*t + c[i];   // Horner's method
  return v;
}

function _sampleCurve(cLat, cLon, tStart, tEnd, nPts) {
  const lls = [];
  for (let i = 0; i <= nPts; i++) {
    const t = tStart + (tEnd - tStart) * i / nPts;
    lls.push([polyEval(cLat, t), polyEval(cLon, t)]);
  }
  return lls;
}

// Draw polynomial-fit trail + prediction for all planes within 2× acRange.
// Trail = smooth curve through last-5 DB positions (solid).
// Pred  = extrapolation 3 min ahead (dashed). Disappears once ≥5 new points arrive.
function drawPredPaths() {
  if (!acMap || !acHome) return;
  const byHex = _groupByHex(_pathData);
  const twoX = (acData || []).filter(a =>
    a.lat != null && a.lon != null && a.distance_km != null && a.distance_km <= acRange * 2
  );
  const active = new Set();

  for (const a of twoX) {
    active.add(a.hex);
    const hist = (byHex[a.hex] || []).slice(-5);
    let trailLLs = null, predLLs = null;

    if (hist.length >= 2) {
      const t0 = hist[0].ts;
      const ts  = hist.map(p => p.ts - t0);
      const lats = hist.map(p => p.lat);
      const lons = hist.map(p => p.lon);
      const deg = Math.min(2, hist.length - 1);
      const cLat = polyFit(ts, lats, deg);
      const cLon = polyFit(ts, lons, deg);
      // Store for smooth animation loop
      _acAnimState[a.hex] = { cLat, cLon, t0, lat:a.lat, lon:a.lon,
                               track:a.track, gs:a.gs, reportedAt: Date.now()/1000 };
      const tTrailEnd = hist.at(-1).ts - t0;
      const tPredEnd  = tTrailEnd + 3*60;
      trailLLs = _sampleCurve(cLat, cLon, 0, tTrailEnd, 10);
      predLLs  = _sampleCurve(cLat, cLon, tTrailEnd, tPredEnd, 10);
    } else if (a.track != null && a.gs) {
      _acAnimState[a.hex] = { cLat:null, cLon:null, t0:null,
                               lat:a.lat, lon:a.lon, track:a.track, gs:a.gs, reportedAt: Date.now()/1000 };
      const distKm = a.gs * (3/60) * 1.852;
      predLLs = [[a.lat, a.lon], destPoint(a.lat, a.lon, a.track, distKm)];
    } else {
      _removePredCurve(a.hex);
      continue;
    }

    const col = a.source === 'public' ? '#7ec8e3' : '#9de8b3';
    if (!_predCurves[a.hex]) _predCurves[a.hex] = {};
    const pc = _predCurves[a.hex];

    if (trailLLs && trailLLs.length > 1) {
      if (pc.trail) pc.trail.setLatLngs(trailLLs).setStyle({color:col});
      else pc.trail = L.polyline(trailLLs, {color:col, weight:2, opacity:0.65}).addTo(acMap);
    } else { if (pc.trail) { acMap.removeLayer(pc.trail); delete pc.trail; } }

    if (predLLs && predLLs.length > 1) {
      if (pc.pred) pc.pred.setLatLngs(predLLs).setStyle({color:col});
      else pc.pred = L.polyline(predLLs, {color:col, weight:1.5, opacity:0.5, dashArray:'5 7'}).addTo(acMap);
    } else { if (pc.pred) { acMap.removeLayer(pc.pred); delete pc.pred; } }
  }

  // Clean up curves for planes no longer in extended range
  for (const hex of Object.keys(_predCurves)) {
    if (!active.has(hex)) _removePredCurve(hex);
  }
}

function _removePredCurve(hex) {
  const pc = _predCurves[hex];
  if (!pc) return;
  if (pc.trail) acMap.removeLayer(pc.trail);
  if (pc.pred)  acMap.removeLayer(pc.pred);
  delete _predCurves[hex];
  delete _acAnimState[hex];
}

function planeIcon(track, source, type, category) {
  const cls = source === 'public' ? 'planeicon public' : 'planeicon';
  const sz = planeSize(type, category);
  return L.divIcon({ className:'', iconSize:[sz, sz], iconAnchor:[sz/2, sz/2],
    html:`<div class="${cls}" style="font-size:${sz}px;line-height:${sz}px;transform:rotate(${(track || 0) - 45}deg)">✈️</div>` });
}

function renderAircraft() {
  if (!acMap) return;
  const inRange = acData.filter(a => a.distance_km != null && a.distance_km <= acRange);
  const nLocal = inRange.filter(a => a.source !== 'public').length;   // 'local' or 'both'
  const nPublic = inRange.length - nLocal;
  $('#acCount').textContent = nPublic
    ? `${nLocal} local · ${nPublic} ref`
    : `${inRange.length} in range`;
  $('#acRangeLbl').textContent = `· ≤ ${fmtKm(acRange)}`;

  const seen = new Set();
  inRange.forEach(a => {
    if (a.lat == null || a.lon == null) return;
    seen.add(a.hex);
    const ll = [a.lat, a.lon];
    if (acIcons[a.hex]) acIcons[a.hex].setLatLng(ll).setIcon(planeIcon(a.track, a.source, a.type, a.category));
    else acIcons[a.hex] = L.marker(ll, { icon: planeIcon(a.track, a.source, a.type, a.category) }).addTo(acMap);
    const src = a.source === 'public' ? ' · reference feed'
              : a.source === 'both' ? ' · local + reference' : ' · local SDR';
    const al = acAirline(a.flight); const kd = acKind(a.category, a.flight);
    acIcons[a.hex].bindPopup(
      `<b>${a.flight || a.hex}</b>${al ? ' · ' + al : ''}${kd ? ' <small>(' + kd + ')</small>' : ''}<br>`
      + `${a.desc || a.type || '—'}<br>`
      + `${a.alt_baro != null ? a.alt_baro + ' ft' : '—'} · ${a.gs != null ? Math.round(a.gs) + ' kt' : '—'}<br>`
      + `${a.distance_km} km · ${Math.round(a.bearing_deg)}°${src}`);
  });
  Object.keys(acIcons).forEach(h => { if (!seen.has(h)) { acMap.removeLayer(acIcons[h]); delete acIcons[h]; } });

  drawPredPaths();

  const rows = inRange.map(a => {
    const vr = a.baro_rate || 0;
    const ar = vr > 64 ? '<span class="up">▲</span>' : vr < -64 ? '<span class="down">▼</span>' : '<span class="lvl">–</span>';
    const airline = acAirline(a.flight);
    const kind = acKind(a.category, a.flight);
    const model = a.desc || a.type || '';
    const wt = acWeight(a.type, a.category);
    const age = acAge(a.year);
    const flag = _regFlag(a.reg);
    const flightId = (a.flight || '').trim();
    const flightCell = flightId
      ? `<a class="flightlink" href="https://www.flightradar24.com/${flightId.toLowerCase()}" target="_blank" rel="noopener">${flightId}</a>`
      : a.hex;
    return `<tr class="${a.source === 'public' ? 'public' : ''}" data-hex="${a.hex}" style="cursor:pointer">`
      + `<td>${flag}</td>`
      + `<td>${flightCell}</td>`
      + `<td>${airline}</td>`
      + `<td>${kind}</td>`
      + `<td title="${a.desc || ''}">${model}</td>`
      + `<td>${wt}</td>`
      + `<td>${age}</td>`
      + `<td>${a.alt_baro != null ? a.alt_baro : '—'}</td>`
      + `<td>${a.gs != null ? Math.round(a.gs) : '—'}</td>`
      + `<td>${a.distance_km != null ? a.distance_km.toFixed(1) : '—'}</td>`
      + `<td>${a.bearing_deg != null ? Math.round(a.bearing_deg) : '—'}</td>`
      + `<td>${ar}</td></tr>`;
  });
  $('#acRows').innerHTML = rows.join('') || `<tr><td colspan="12" style="color:var(--mut);padding:14px">No aircraft in range</td></tr>`;

  // row click → pan map to aircraft + highlight row
  $('#acRows').querySelectorAll('tr[data-hex]').forEach(tr => {
    tr.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;   // don't intercept flight-link clicks
      const hex = tr.dataset.hex;
      const ac = inRange.find(a => a.hex === hex);
      if (ac && ac.lat != null && acMap) {
        acMap.setView([ac.lat, ac.lon], Math.max(acMap.getZoom(), 11), {animate:true});
        if (acIcons[hex]) acIcons[hex].openPopup();
      }
      $('#acRows').querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
      tr.classList.add('selected');
    });
  });

  drawSideView();
}

(async function init(){
  renderToggles();
  await loadMetrics();
  await query();
  await loadDevices();
  setInterval(loadDevices, 30000);   // re-poll device state (also drives offline detection)
  applyMode(_appMode);
  await initAircraft();
  loadFlightPaths();
  setInterval(loadFlightPaths, 60000);
  loadWeather();
  setInterval(loadWeather, 600000);
  _startAnimLoop();
  connectWS();
  keepAwake();
  setInterval(loadMetrics, 60000);
})();
</script>
</body>
</html>
